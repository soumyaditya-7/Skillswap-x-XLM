name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ─────────────────────────────────────────────────
  # Job 1: Lint & Build (Frontend)
  # ─────────────────────────────────────────────────
  build:
    name: 🔍 Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install frontend dependencies
        run: npm ci

      - name: 🔎 Run ESLint
        run: npm run lint

      - name: 🏗️ Build production bundle
        run: npm run build

      - name: ✅ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────
  # Job 2: Backend Dependency Check
  # ─────────────────────────────────────────────────
  backend-check:
    name: 🛠️ Backend Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: ✅ Backend dependency check passed
        run: echo "All backend dependencies installed successfully."

  # ─────────────────────────────────────────────────
  # Job 3: Smart Contract Build (Soroban/Rust)
  # ─────────────────────────────────────────────────
  contract-build:
    name: 🦀 Soroban Contract Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🦀 Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: 🔐 Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 🏗️ Build Soroban contract (WASM)
        working-directory: ./contracts
        run: cargo build --target wasm32v1-none --release

      - name: 🧪 Run contract tests
        working-directory: ./contracts
        run: cargo test
